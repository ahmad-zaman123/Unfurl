name: Redis Keep-Alive
on:
  schedule:
    - cron: '0 0 */7 * *'  # every 7 days
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Install redis-cli
        run: sudo apt-get install -y redis-tools

      - name: Ping Redis
        run: redis-cli -u "${{ secrets.REDIS_URL }}" SET keepalive "ping" EX 604800
